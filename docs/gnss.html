<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GNSS Mérési Jegyzőkönyv</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --txt:#e2e8f0;
          --muted:#94a3b8; --accent:#38bdf8; --err:#ef4444; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); }
  header { padding:16px 24px; border-bottom:1px solid var(--line); }
  header a.home { color:var(--accent); text-decoration:none; font-size:13px; }
  header h1 { margin:6px 0 0; font-size:20px; }
  main { max-width:1180px; margin:0 auto; padding:22px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px;
           padding:20px; margin-bottom:18px; }
  label.file { font-size:13px; color:var(--muted); display:block; margin-bottom:6px; }
  input[type=file] { width:100%; padding:9px 10px; background:#0b1220; color:var(--txt);
           border:1px solid var(--line); border-radius:7px; font-size:14px; }
  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:14px; }
  button { background:var(--accent); color:#06283d; border:0; padding:10px 18px;
           border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .msg { font-size:13px; color:var(--muted); }
  .msg.err { color:var(--err); }

  /* ---- A jegyzőkönyv "papír" (képernyőn és nyomtatásban is) ---- */
  #report { display:none; background:#fff; color:#111; border-radius:8px;
            padding:14mm 12mm; margin:0 auto; box-shadow:0 6px 30px rgba(0,0,0,.4);
            overflow-x:auto; }
  #report.show { display:block; }
  .rep-head { border-bottom:2px solid #111; padding-bottom:8px; margin-bottom:12px; }
  .rep-head h2 { margin:0; font-size:20px; letter-spacing:.3px; }
  .rep-head .sub { color:#444; font-size:12px; margin-top:3px; }
  .meta-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
               gap:10px 18px; margin-bottom:14px; }
  .meta-sec { border:1px solid #ccc; border-radius:6px; padding:8px 10px; break-inside:avoid; }
  .meta-sec h3 { margin:0 0 6px; font-size:12px; text-transform:uppercase;
                 letter-spacing:.5px; color:#0b5; color:#0a6; border-bottom:1px solid #eee;
                 padding-bottom:3px; }
  .meta-sec .kv { display:flex; justify-content:space-between; gap:10px; font-size:11px;
                  padding:1.5px 0; }
  .meta-sec .kv .k { color:#555; }
  .meta-sec .kv .v { color:#111; font-weight:600; text-align:right; }
  .pts-title { font-size:13px; font-weight:700; margin:10px 0 6px; }
  table.pts { border-collapse:collapse; width:100%; font-size:8px; }
  table.pts th, table.pts td { border:1px solid #bbb; padding:2px 3px; text-align:right;
                               white-space:nowrap; }
  table.pts th { background:#eef2f7; color:#111; font-weight:700; text-align:center;
                 white-space:normal; vertical-align:bottom; }
  table.pts td.txt, table.pts th.txt { text-align:left; }
  table.pts tr:nth-child(even) td { background:#f7f9fb; }

  @page { size: A4 landscape; margin: 8mm; }
  @media print {
    body { background:#fff; }
    .no-print { display:none !important; }
    header, main { padding:0; max-width:none; }
    #report { display:block; box-shadow:none; border-radius:0; padding:0; overflow:visible; }
    table.pts { font-size:6pt; }
    table.pts th, table.pts td { padding:1px 2px; }
    .meta-sec { border-color:#999; }
  }
</style>
</head>
<body>
<header class="no-print">
  <a class="home" href="./index.html">← Kezdőlap</a>
  <h1>GNSS jegyzőkönyv készítő</h1>
</header>

<main>
  <div class="panel no-print">
    <label class="file">Nyers mérési jegyzőkönyv (.txt) — jelenleg támogatott: Satlab</label>
    <input id="fileInput" type="file" accept=".txt,text/*">
    <div class="toolbar">
      <button id="btnPrint" disabled>PDF mentése / nyomtatás</button>
      <span class="msg" id="msg">Tölts fel egy nyers jegyzőkönyvet.</span>
    </div>
  </div>

  <div id="report"></div>
</main>

<script type="module">
import { parseReport } from './gnss.js';

const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[<>&]/g, c => ({ "<":"&lt;", ">":"&gt;", "&":"&amp;" }[c]));

$("#fileInput").onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = () => render(rd.result, f.name);
  rd.readAsText(f);
};

function render(text, fname) {
  const r = parseReport(text);
  const msg = $("#msg");
  if (!r.ok) {
    msg.className = "msg err"; msg.textContent = r.error;
    $("#report").className = ""; $("#btnPrint").disabled = true;
    return;
  }
  msg.className = "msg";
  msg.textContent = `Felismerve: ${r.manufacturer} · ${r.points.length} pont`;

  // Metaadat szekciók
  const gen = (r.meta.find(s => s.title === "Általános adatok") || { rows: [] }).rows;
  const findv = k => (gen.find(([kk]) => kk === k) || [])[1] || "";
  const sub = [r.title, findv("Dátum") ? "Dátum: " + findv("Dátum") : "", "Gyártó: " + r.manufacturer]
              .filter(Boolean).join(" · ");

  const metaHtml = r.meta.map(s => `
    <div class="meta-sec">
      <h3>${esc(s.title)}</h3>
      ${s.rows.map(([k, v]) => `<div class="kv"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join("")}
    </div>`).join("");

  // Pont-tábla; a "KezdHelyi idő" dátum/idő két sorba tördelve a keskenyebb oszlopért
  const timeIdx = r.columns.indexOf("KezdHelyi idő");
  const txtCols = new Set([r.columns.indexOf("Név"), r.columns.indexOf("AntH Pos"),
                           r.columns.indexOf("Állapot"), timeIdx]);
  const thead = `<tr>${r.columns.map((c, i) =>
      `<th class="${txtCols.has(i) ? "txt" : ""}">${esc(c)}</th>`).join("")}</tr>`;
  const tbody = r.points.map(row => `<tr>${row.map((v, i) => {
      let cell = esc(v);
      if (i === timeIdx) cell = cell.replace(" ", "<br>");
      return `<td class="${txtCols.has(i) ? "txt" : ""}">${cell}</td>`;
    }).join("")}</tr>`).join("");

  $("#report").innerHTML = `
    <div class="rep-head">
      <h2>GNSS Mérési Jegyzőkönyv</h2>
      <div class="sub">${esc(sub)}</div>
    </div>
    <div class="meta-grid">${metaHtml}</div>
    <div class="pts-title">Mért pontok (${r.points.length})</div>
    <table class="pts"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  $("#report").className = "show";
  $("#btnPrint").disabled = false;
}

$("#btnPrint").onclick = () => window.print();
</script>
</body>
</html>

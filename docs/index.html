<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geodéziai eszközök</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#101216; --txt:#e8eaef; --muted:#949bab; --title:#f2f4f8;
    --rule:#242833; --accent:#e0a84b; --rowhover:#181b22;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Consolas,monospace;
  }
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);
       -webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .page{max-width:1000px;margin:0 auto;padding:64px 32px;min-height:100vh;
        display:flex;flex-direction:column;justify-content:center}
  .title{font-size:clamp(34px,5vw,52px);font-weight:600;letter-spacing:-.02em;
         color:var(--title);margin-bottom:44px;text-wrap:balance}
  .list{border-top:1px solid var(--rule)}
  .row{display:flex;align-items:baseline;gap:24px;padding:26px 6px;
       border-bottom:1px solid var(--rule);transition:background .16s,padding .16s}
  .row .rn{font-family:var(--mono);font-size:12px;opacity:.5;width:26px;flex:none}
  .row h3{font-size:clamp(22px,3vw,30px);font-weight:600;letter-spacing:-.02em;
          color:var(--title);flex:none;min-width:min(46%,340px)}
  .row p{font-size:14px;line-height:1.5;color:var(--muted)}
  .row .arr{margin-left:auto;font-size:20px;color:var(--accent);opacity:.4;
            transition:opacity .16s,transform .16s}
  .row:hover{background:var(--rowhover);padding-left:14px;padding-right:14px}
  .row:hover .arr{opacity:1;transform:translateX(4px)}
  .row:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media(max-width:680px){
    .row{flex-wrap:wrap;gap:6px 16px}
    .row h3{min-width:0;width:calc(100% - 42px)}
    .row p{width:100%;padding-left:50px}
    .row .arr{position:absolute}
  }
</style>
</head>
<body>
<main class="page">
  <h1 class="title">Geodéziai eszközök</h1>
  <nav class="list">
    <a class="row" href="./vitel.html">
      <span class="rn">01</span>
      <h3>VITEL transzformáció</h3>
      <p>WGS84 ⇄ EOV átszámítás. Kézi bevitel, fájl import, DXF → KML.</p>
      <span class="arr" aria-hidden="true">→</span>
    </a>
    <a class="row" href="./gnss.html">
      <span class="rn">02</span>
      <h3>GNSS jegyzőkönyv</h3>
      <p>Mérési jegyzőkönyv és ellenőrző mérés nyers vevőfájlból.</p>
      <span class="arr" aria-hidden="true">→</span>
    </a>
    <a class="row" href="./pdfa.html">
      <span class="rn">03</span>
      <h3>PDF/A ellenőrzés</h3>
      <p>PDF/A megfelelőség vizsgálata és konverzió.</p>
      <span class="arr" aria-hidden="true">→</span>
    </a>
  </nav>
</main>
</body>
</html>
